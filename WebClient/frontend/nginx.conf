# =============================================================================
# nginx site config for the OmniProctor WebClient SPA.
#
# Responsibilities:
#   * Serve the built Vite bundle from /usr/share/nginx/html.
#   * Fall back to index.html for unknown paths so React Router can take over
#     (without this, refreshing /tests or /live would 404).
#   * Disable caching for index.html and /config.js so a fresh deploy is
#     picked up immediately. Hashed assets under /assets/ get a long cache.
#   * Apply baseline security headers.
#
# We deliberately do NOT reverse-proxy /api/ here. The kiosk launcher embeds
# the API base URL into the omniproctor-browser:// link that opens on the
# student's machine, so the URL must be reachable from the public internet
# directly (not via the SPA host). Putting both behind one nginx is fine -
# just front it with a separate `location /api/` block on your edge proxy
# (Azure Front Door, Application Gateway, or another nginx).
# =============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Useful diagnostics on the VM.
    access_log /var/log/nginx/access.log  combined;
    error_log  /var/log/nginx/error.log   warn;

    # Tell upstream proxies + browsers that responses can vary by
    # Accept-Encoding (matters when something like Front Door sits in front).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ---------- security headers ------------------------------------------
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-Frame-Options        "SAMEORIGIN"     always;
    add_header Referrer-Policy        "no-referrer"    always;
    add_header Permissions-Policy     "camera=(self), microphone=(), geolocation=()" always;

    # ---------- liveness probe --------------------------------------------
    # Tiny endpoint Azure Load Balancer / Front Door can hit cheaply.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---------- runtime config --------------------------------------------
    # /config.js is rewritten on every container start by the entrypoint.
    # Never cache it, otherwise an env change wouldn't propagate until
    # browsers happened to refetch.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma        "no-cache" always;
        try_files /config.js =404;
    }

    # ---------- hashed assets (cache aggressively) ------------------------
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ---------- SPA fallback ----------------------------------------------
    location / {
        # index.html itself must be revalidated each request; otherwise
        # users on long-lived tabs keep loading the previous deploy.
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
