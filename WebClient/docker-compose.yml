services:
  db:
    image: postgres:16-alpine
    container_name: omniproctor-webclient-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: omniproctor
      POSTGRES_USER: omniproctor
      POSTGRES_PASSWORD: omniproctor
    ports:
      - "5434:5432"
    volumes:
      - webclient_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniproctor -d omniproctor"]
      interval: 5s
      timeout: 5s
      retries: 10

  webclient-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omniproctor-webclient-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://omniproctor:omniproctor@db:5432/omniproctor
      # Cross-filesystem bind mounts can't hardlink; stop uv from warning.
      UV_LINK_MODE: copy
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    # Only mount the source so the in-image /app/.venv survives. Mounting the
    # whole repo would replace /app entirely, wiping the venv built during
    # `docker build` and forcing `uv sync` to re-run on every container start
    # (and breaking on Windows because the host .venv contains macOS symlinks).
    volumes:
      - ./app:/app/app
      # Drop OmniProctorKioskSetup-<version>.exe into ./installers/ on the
      # host (renamed to OmniProctorKioskSetup.exe) and it will be served by
      # GET /api/v1/downloads/installer/windows. See WebClient/installers/README.md.
      - ./installers:/var/lib/omniproctor/installers:ro

  webclient-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omniproctor-webclient-frontend
    restart: unless-stopped
    depends_on:
      - webclient-api
    environment:
      # The kiosk launcher embeds this URL into the omniproctor-browser://
      # link, so it must be reachable from each student's PC - NOT a docker
      # network alias. For local dev that's the host-mapped 8001 port; for
      # an Azure VM deployment override this in docker-compose.prod.yml or
      # via shell env (e.g. API_BASE_URL=https://omniproctor.example.com/api/v1).
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8001/api/v1}
      APP_NAME: ${APP_NAME:-OmniProctor}
    ports:
      - "8080:80"

volumes:
  webclient_pgdata:
